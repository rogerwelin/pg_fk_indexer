name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pg: [14, 15, 16, 17]
    name: PostgreSQL ${{ matrix.pg }}

    steps:
      - uses: actions/checkout@v4

      - name: Add PostgreSQL APT repository
        run: |
          sudo apt-get install -y --no-install-recommends curl ca-certificates
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/pgdg.gpg
          echo "deb [signed-by=/usr/share/keyrings/pgdg.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update

      - name: Install PostgreSQL ${{ matrix.pg }}
        run: |
          sudo apt-get install -y --no-install-recommends \
            postgresql-${{ matrix.pg }} \
            postgresql-server-dev-${{ matrix.pg }}

      - name: Stop existing PostgreSQL instances
        run: |
          sudo pg_lsclusters -h | awk '{print $1, $2}' | while read ver name; do
            sudo pg_dropcluster --stop "$ver" "$name" || true
          done

      - name: Start PostgreSQL
        run: |
          sudo pg_createcluster ${{ matrix.pg }} main --start

      - name: Build and install extension
        run: |
          make PG_CONFIG=/usr/lib/postgresql/${{ matrix.pg }}/bin/pg_config
          sudo make install PG_CONFIG=/usr/lib/postgresql/${{ matrix.pg }}/bin/pg_config

      - name: Create test role
        run: |
          sudo -u postgres psql -c "CREATE ROLE runner WITH LOGIN SUPERUSER"

      - name: Run tests
        run: |
          make installcheck PG_CONFIG=/usr/lib/postgresql/${{ matrix.pg }}/bin/pg_config || true
          sed -i 's/[[:space:]]*$//' results/test_basic.out expected/test_basic.out
          diff expected/test_basic.out results/test_basic.out
